<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心脏外科患者出院告知单生成系统</title>
<style>
  :root {
    --primary: #1e6fb8;
    --primary-dark: #15528a;
    --bg: #eef2f6;
    --border: #d4dce4;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    background: var(--bg);
    color: #2c3e50;
    font-size: 14px;
  }

  /* ===== 工具栏 ===== */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--primary); color: #fff;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .toolbar h1 { font-size: 17px; margin: 0 auto 0 0; font-weight: 600; }
  .toolbar button {
    border: none; border-radius: 4px; padding: 8px 18px;
    font-size: 14px; cursor: pointer; background: #fff; color: var(--primary-dark);
    font-weight: 600;
  }
  .toolbar button:hover { background: #e8f1fa; }
  .toolbar button.danger { background: transparent; color: #ffd9d3; border: 1px solid #ffd9d3; }

  /* ===== 布局 ===== */
  .layout {
    display: flex; gap: 16px; padding: 16px;
    max-width: 1500px; margin: 0 auto;
    align-items: flex-start;
  }
  .form-panel { flex: 0 0 460px; }
  .preview-panel { flex: 1; min-width: 0; }

  /* ===== 表单卡片 ===== */
  fieldset {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    margin: 0 0 14px; padding: 12px 16px 16px;
  }
  legend {
    font-weight: 700; color: var(--primary-dark); padding: 0 8px; font-size: 15px;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
  label.field { display: block; font-size: 13px; color: #555; }
  label.field input, label.field select {
    width: 100%; margin-top: 3px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 4px; font-size: 14px;
  }
  .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
  .checks label {
    display: flex; align-items: center; gap: 6px; padding: 5px 8px;
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    user-select: none;
  }
  .checks label:has(input:checked) { background: #e8f1fa; border-color: var(--primary); }
  .hint { font-size: 12px; color: #888; margin: 6px 0 8px; }

  /* ===== 药品录入 ===== */
  .med-row {
    display: grid; grid-template-columns: 1.2fr 0.9fr 1fr 0.7fr 1fr 28px;
    gap: 5px; margin-bottom: 6px; align-items: center;
  }
  .med-row input, .med-row select {
    width: 100%; padding: 5px 6px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px;
  }
  .med-row .del {
    border: none; background: none; color: var(--danger);
    font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
  }
  .med-head { font-size: 12px; color: #777; font-weight: 600; }
  #addMed {
    margin-top: 4px; padding: 6px 14px; border: 1px dashed var(--primary);
    background: #f4f9fe; color: var(--primary-dark); border-radius: 4px; cursor: pointer;
  }

  /* ===== A4 预览 ===== */
  .sheet {
    background: #fff; width: 210mm; max-width: 100%;
    min-height: 297mm; margin: 0 auto;
    padding: 16mm 18mm; box-shadow: 0 2px 12px rgba(0,0,0,.15);
    font-size: 13.5px; line-height: 1.7;
  }
  .sheet h2.doc-title {
    text-align: center; font-size: 21px; margin: 0 0 2px; letter-spacing: 2px;
  }
  .sheet .hospital {
    text-align: center; font-size: 15px; color: #444; margin-bottom: 4px;
  }
  .sheet hr.rule { border: none; border-top: 2px solid #333; margin: 6px 0 12px; }
  .pt-info {
    width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 13px;
  }
  .pt-info td { border: 1px solid #999; padding: 4px 8px; }
  .pt-info td.k { background: #f3f5f7; width: 72px; white-space: nowrap; text-align: center; }
  .sheet h3 {
    font-size: 15px; margin: 14px 0 6px; padding-left: 8px;
    border-left: 4px solid var(--primary); page-break-after: avoid;
  }
  .sheet h4 { font-size: 13.5px; margin: 8px 0 3px; page-break-after: avoid; }
  .sheet ul { margin: 2px 0 8px; padding-left: 22px; }
  .sheet li { margin-bottom: 2px; }
  .redflag-box {
    border: 1.5px solid var(--danger); border-radius: 6px;
    padding: 8px 14px; margin-top: 6px; page-break-inside: avoid;
  }
  .redflag-box h3 { border-left-color: var(--danger); color: var(--danger); margin-top: 0; }
  table.meds {
    width: 100%; border-collapse: collapse; font-size: 12.5px; margin: 4px 0 8px;
  }
  table.meds th, table.meds td { border: 1px solid #999; padding: 4px 6px; text-align: center; }
  table.meds th { background: #f3f5f7; }
  .sign-area {
    margin-top: 26px; display: flex; justify-content: space-between;
    page-break-inside: avoid;
  }
  .disclaimer { font-size: 12px; color: #666; margin-top: 18px; border-top: 1px dashed #aaa; padding-top: 6px; }
  .empty-tip { color: #aaa; text-align: center; padding: 60px 0; }

  /* ===== 打印 ===== */
  @media print {
    @page { size: A4; margin: 12mm; }
    body { background: #fff; }
    .toolbar, .form-panel { display: none !important; }
    .layout { display: block; padding: 0; }
    .sheet {
      width: auto; min-height: 0; box-shadow: none;
      padding: 0; margin: 0;
    }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>心脏外科患者出院告知单生成系统</h1>
  <button onclick="render()">生成 / 刷新告知单</button>
  <button onclick="doPrint()">打印</button>
  <button onclick="doPdf()">生成 PDF</button>
  <button class="danger" onclick="clearAll()">清空重填</button>
</div>

<div class="layout">
  <!-- ================= 左侧填写区 ================= -->
  <div class="form-panel" id="formPanel">

    <fieldset>
      <legend>① 患者基本信息</legend>
      <div class="grid2">
        <label class="field">姓名 <input id="ptName"></label>
        <label class="field">性别
          <select id="ptSex"><option value=""></option><option>男</option><option>女</option></select>
        </label>
        <label class="field">年龄 <input id="ptAge" placeholder="岁"></label>
        <label class="field">住院号 <input id="ptId"></label>
        <label class="field">出院日期 <input id="ptDate" type="date"></label>
        <label class="field">出院诊断
          <input id="ptDx" placeholder="如：冠心病、风湿性心脏病…">
        </label>
        <label class="field">手术名称
          <input id="ptOp" placeholder="如：冠状动脉旁路移植术">
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>② 内科合并症（按诊断勾选）</legend>
      <div class="checks" id="diseaseChecks"></div>
    </fieldset>

    <fieldset>
      <legend>③ 手术类型（可多选）</legend>
      <div class="checks" id="surgeryChecks"></div>
    </fieldset>

    <fieldset>
      <legend>④ 出院带药</legend>
      <p class="hint">可点选常用药品自动填入常见用法（剂量请按实际医嘱核改），也可手动逐项录入；
      "药物类别"对应的用药注意事项会自动汇总到告知单。</p>
      <select id="medPick" style="width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:4px;margin-bottom:10px;background:#f4f9fe;">
        <option value="">— 点选常用药品，自动添加一行并填入用法 —</option>
      </select>
      <div class="med-row med-head">
        <span>药品名称</span><span>规格/剂量</span><span>用法</span><span>疗程</span><span>药物类别</span><span></span>
      </div>
      <div id="medRows"></div>
      <button id="addMed" onclick="addMedRow()">＋ 添加药品</button>
    </fieldset>

    <fieldset>
      <legend>⑤ 复诊与随访</legend>
      <div class="grid2">
        <label class="field">首次复诊时间 <input id="fuDate" placeholder="出院后 1～2 周"></label>
        <label class="field">复诊地点 <input id="fuPlace" value="心脏外科二楼门诊"></label>
        <label class="field">随访电话 <input id="fuTel" value="0916-2680021"></label>
        <label class="field">主管医师 <input id="fuDoc"></label>
      </div>
    </fieldset>
  </div>

  <!-- ================= 右侧 A4 预览区 ================= -->
  <div class="preview-panel">
    <div class="sheet" id="sheet">
      <p class="empty-tip">填写左侧信息后，点击顶部「生成 / 刷新告知单」查看预览</p>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   知识库（KB）：科室维护人员仅需修改本区即可增删内容
   ⚠ 以下条目为模板参考，正式启用前须经心脏外科及药剂科审定
===================================================================== */
const KB = {

  /* ---------- 一、一般注意事项（以心力衰竭管理为基底，所有患者） ---------- */
  generalBase: [
    "限制饮水量：每日总入量一般 1500～2000 ml（含汤、粥、水果、输液），遵医嘱调整；避免一次性大量饮水。",
    "低盐低脂、易消化饮食：每日食盐 < 5 g，避免腌制食品；少量多餐，勿过饱。",
    "每日晨起排尿后、早餐前同一条件下称体重并记录：3 天内体重增加超过 2 kg，或出现下肢水肿加重，提示体内液体潴留，及时联系医生调整利尿剂。",
    "活动量以不诱发明显气促、心悸、疲乏为度，循序渐进，量力而行；出现夜间阵发性呼吸困难、不能平卧、端坐呼吸时立即就诊。",
    "每日测量并记录体温、脉搏（心率）、血压，复诊时携带记录本。",
    "严格戒烟（含二手烟），不饮酒。",
    "按时按量服药（利尿、强心、改善心功能等药物），不可自行停药、减药或换药。",
    "保持大便通畅，排便勿用力屏气，必要时遵医嘱使用缓泻剂。",
    "注意保暖，预防感冒；流感季节避免前往人群密集场所，可咨询医生接种流感及肺炎疫苗。",
    "保证充足睡眠，保持情绪平稳，避免激动、紧张和过度劳累。",
    "每次就诊（含口腔科、其他专科）时主动告知医生心脏病史、手术史及目前用药。"
  ],

  /* ---------- 手术/操作相关一般注意事项（选择任一手术后显示） ---------- */
  generalSurgical: [
    "伤口护理：保持切口/穿刺点清洁干燥，每日观察有无红肿、渗液、裂开或异常疼痛；术后 2 周内擦浴，伤口完全愈合前勿盆浴、泡澡或游泳。",
    "正中开胸患者：胸骨保护 6～8 周——咳嗽或打喷嚏时双手抱枕按压胸前；勿单臂支撑起身、勿推拉重物、勿提超过 5 kg 重物；术后 6 周内不驾驶机动车，乘车系安全带可垫小枕保护胸骨。",
    "介入/穿刺患者：穿刺部位 1～2 周内避免用力下蹲、剧烈活动，观察有无渗血、血肿或搏动性包块，发现异常及时就诊。",
    "术后 3 个月内避免剧烈运动及竞技性活动；恢复重体力劳动、驾驶及性生活的时间请咨询主管医师。",
    "按医嘱时间到门诊拆线、复查伤口。"
  ],

  /* ---------- 紧急就医指征（红色警示框） ---------- */
  redFlags: [
    "胸痛、胸闷持续不缓解，或含服硝酸甘油后仍不缓解",
    "明显呼吸困难、不能平卧、夜间憋醒",
    "晕厥、黑矇，或心率持续 > 120 次/分或 < 50 次/分、自觉心跳明显不规则",
    "发热体温 > 38.5 ℃，或伤口红肿、流脓、裂开",
    "突发剧烈胸背部撕裂样疼痛",
    "咯血、呕血、黑便、肉眼血尿，或皮肤大片瘀斑等出血表现",
    "一侧肢体无力、麻木、口角歪斜、言语不清（警惕脑卒中）",
    "双下肢明显水肿加重，或单侧小腿肿胀疼痛"
  ],

  /* ---------- 二、内科合并症 ---------- */
  diseases: {
    ht: { label: "高血压", items: [
      "每日早晚各测一次血压并记录，复诊时携带记录；一般控制目标 < 130/80 mmHg，具体以医嘱为准。",
      "降压药须长期规律服用，血压正常也不可自行停药；如血压持续 > 160/100 mmHg 或出现头晕头痛，及时就诊。",
      "严格限盐（每日食盐 < 5 g），避免腌制食品。"
    ]},
    dm: { label: "糖尿病", items: [
      "规律监测血糖：一般空腹 4.4～7.0 mmol/L、餐后 2 小时 < 10.0 mmol/L，具体目标遵医嘱。",
      "识别低血糖表现（心慌、出汗、手抖、饥饿感、意识模糊），随身携带糖果或含糖饮料，发作时立即进食并复测血糖。",
      "糖尿病影响伤口愈合，更需密切观察切口情况；做好足部护理，每日检查双足皮肤。",
      "饮食定时定量，胰岛素注射者注意轮换注射部位。"
    ]},
    af: { label: "心房颤动", items: [
      "严格按医嘱服用抗凝/抗心律失常药物，不可漏服或自行停药。",
      "每日自测脉搏，若心室率持续 > 120 次/分或 < 50 次/分，或心悸、头晕明显，及时就诊。",
      "服抗凝药期间注意观察出血倾向（牙龈出血、瘀斑、黑便、血尿等）。"
    ]},
    lipid: { label: "高脂血症", items: [
      "坚持服用他汀类等调脂药物，即使血脂正常也不可自行停药（兼有稳定斑块作用）。",
      "如出现不明原因肌肉酸痛、乏力或尿色加深，及时就诊查肌酶。",
      "出院后 4～6 周复查血脂、肝功能。"
    ]},
    ckd: { label: "慢性肾功能不全", items: [
      "避免使用肾毒性药物（如部分止痛药/退烧药即非甾体抗炎药、部分抗生素），用药前告知医生肾病史。",
      "注意尿量变化，明显减少（每日 < 400 ml）时及时就诊。",
      "定期复查血肌酐、电解质；优质低蛋白饮食，遵肾内科医嘱。"
    ]},
    copd: { label: "慢阻肺/慢性支气管炎", items: [
      "严格戒烟；坚持腹式呼吸、缩唇呼吸训练及有效咳嗽排痰。",
      "规律使用吸入药物，掌握正确吸入方法；有家庭氧疗指征者每日低流量吸氧。",
      "咳嗽加重、痰量增多变黄或气促加重提示急性加重，及时就诊。"
    ]},
    stroke: { label: "脑卒中病史", items: [
      "坚持服用抗栓及他汀类药物，控制血压、血糖、血脂等危险因素。",
      "坚持康复训练（肢体、言语），防跌倒：穿防滑鞋、夜间留灯、起身动作放缓。",
      "再发肢体无力、麻木、言语不清、视物异常等，立即拨打急救电话。"
    ]}
  },

  /* ---------- 三、术后专项要求 ---------- */
  surgeries: {
    cabg: { label: "冠状动脉旁路移植术（搭桥）", items: [
      "取大隐静脉侧下肢：白天穿弹力袜 4～6 周，休息时抬高患肢，观察肿胀及伤口情况。",
      "严格服用抗血小板等冠心病二级预防药物，不可自行停药；建议参加心脏康复运动训练。",
      "再发心绞痛样胸痛及时舌下含服硝酸甘油并就诊，持续不缓解立即拨打 120。"
    ]},
    valveMech: { label: "机械瓣置换", items: [
      "终身服用华法林抗凝，绝对不可漏服或自行停药。",
      "定期监测 INR：出院初期每 3～7 天一次，稳定后每 2～4 周一次；INR 控制目标遵医嘱（一般主动脉瓣 1.8～2.5，二尖瓣 2.0～3.0）。",
      "保持饮食结构稳定，富含维生素 K 的食物（绿叶蔬菜、动物肝脏）不必禁食但摄入量应均衡稳定。",
      "出现出血表现（牙龈出血不止、黑便、血尿、大片瘀斑）或栓塞表现（肢体无力、言语不清、突发腹痛/肢体剧痛发凉），立即就诊。",
      "任何拔牙、胃肠镜、手术等有创操作前，务必告知医生正在服用华法林，由医生决定是否桥接抗凝。",
      "育龄期女性如有妊娠计划，须提前至心脏专科及产科咨询调整抗凝方案。",
      "注意预防感染性心内膜炎：保持口腔卫生，牙科操作前咨询是否需预防性使用抗生素。"
    ]},
    valveBio: { label: "生物瓣置换", items: [
      "术后一般需抗凝 3～6 个月（华法林或遵医嘱），之后按医嘱调整为抗血小板或停用，切勿自行决定。",
      "抗凝期间定期监测 INR，注意出血及栓塞表现（同抗凝注意事项）。",
      "终身注意预防感染性心内膜炎：保持口腔卫生，拔牙等牙科操作前告知医生人工瓣膜史，必要时预防性使用抗生素。",
      "生物瓣有远期衰败可能，须坚持每年心脏超声随访。"
    ]},
    valveRepair: { label: "瓣膜成形/修复术", items: [
      "按医嘱完成术后抗凝/抗血小板疗程（一般 3 个月左右），不可自行停药。",
      "术后 3 个月、6 个月、1 年复查心脏超声，之后每年复查，评估瓣膜功能。",
      "注意预防感染性心内膜炎：口腔卫生、有创操作前告知瓣膜手术史。"
    ]},
    aorta: { label: "主动脉夹层/大血管开放手术", items: [
      "严格控制血压是重中之重：一般目标收缩压 < 120 mmHg、心率 < 70 次/分（遵医嘱），每日早晚测量并记录。",
      "严禁用力屏气：保持大便通畅，避免提重物，剧烈咳嗽时及时处理，避免情绪剧烈波动。",
      "按计划复查主动脉 CTA（一般术后 3 个月、6 个月、12 个月，之后每年一次），评估残余夹层及人工血管情况。",
      "突发剧烈胸痛、背痛、腹痛呈撕裂样，立即拨打急救电话，平卧勿活动。"

/* =====================================================================
   页面逻辑
===================================================================== */
const $ = id => document.getElementById(id);

function buildChecks(containerId, dict, prefix) {
  $(containerId).innerHTML = Object.entries(dict).map(([k, v]) =>
    `<label><input type="checkbox" id="${prefix}_${k}" value="${k}"> ${v.label}</label>`
  ).join("");
}
buildChecks("diseaseChecks", KB.diseases, "dz");
buildChecks("surgeryChecks", KB.surgeries, "op");

/* 常用药品点选下拉（按药物类别分组） */
(function buildMedPick() {
  const groups = {};
  DRUGS.forEach((d, i) => {
    const g = KB.drugClasses[d.cls] ? KB.drugClasses[d.cls].label : "其他";
    (groups[g] ||= []).push(`<option value="${i}">${d.name}（${d.dose}，${d.usage}）</option>`);
  });
  $("medPick").innerHTML += Object.entries(groups)
    .map(([g, opts]) => `<optgroup label="${g}">${opts.join("")}</optgroup>`).join("");
  $("medPick").addEventListener("change", function () {
    if (this.value === "") return;
    const rows = document.querySelectorAll("#medRows .med-row");
    const last = rows[rows.length - 1];
    // 末行为空白行时直接填入，否则新增一行
    if (last && !last.querySelector(".m-name").value.trim()) last.remove();
    addMedRow(DRUGS[this.value]);
    this.value = "";
    saveDraft();
  });
})();

function addMedRow(data = {}) {
  const row = document.createElement("div");
  row.className = "med-row";
  const opts = Object.entries(KB.drugClasses)
    .map(([k, v]) => `<option value="${k}">${v.label}</option>`).join("");
  row.innerHTML = `
    <input class="m-name" placeholder="阿司匹林肠溶片" value="${data.name || ""}">
    <input class="m-dose" placeholder="100mg" value="${data.dose || ""}">
    <input class="m-usage" placeholder="每日1次 口服" value="${data.usage || ""}">
    <input class="m-course" placeholder="长期" value="${data.course || ""}">
    <select class="m-class"><option value="">（不关联）</option>${opts}</select>
    <button class="del" title="删除" onclick="this.parentNode.remove(); saveDraft()">×</button>`;
  if (data.cls) row.querySelector(".m-class").value = data.cls;
  $("medRows").appendChild(row);
}

function getMeds() {
  return [...document.querySelectorAll("#medRows .med-row")].map(r => ({
    name: r.querySelector(".m-name").value.trim(),
    dose: r.querySelector(".m-dose").value.trim(),
    usage: r.querySelector(".m-usage").value.trim(),
    course: r.querySelector(".m-course").value.trim(),
    cls: r.querySelector(".m-class").value
  })).filter(m => m.name || m.cls);
}

const checked = prefix => [...document.querySelectorAll(`[id^="${prefix}_"]:checked`)].map(c => c.value);
const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const ul = items => `<ul>${items.map(i => `<li>${i}</li>`).join("")}</ul>`;

function render() {
  saveDraft();
  const dz = checked("dz"), op = checked("op"), meds = getMeds();
  const v = id => esc($(id).value.trim());
  let n = 0; const sec = t => `<h3>${["一","二","三","四","五","六"][n++]}、${t}</h3>`;

  let html = `
    <div class="hospital">汉中市中心医院　心脏外科</div>
    <h2 class="doc-title">出院告知书</h2>
    <hr class="rule">
    <table class="pt-info">
      <tr><td class="k">姓名</td><td>${v("ptName")}</td>
          <td class="k">性别</td><td>${v("ptSex")}</td>
          <td class="k">年龄</td><td>${v("ptAge")}</td>
          <td class="k">住院号</td><td>${v("ptId")}</td></tr>
      <tr><td class="k">出院诊断</td><td colspan="3">${v("ptDx")}</td>
          <td class="k">出院日期</td><td colspan="2">${v("ptDate")}</td></tr>
      <tr><td class="k">手术名称</td><td colspan="7">${v("ptOp")}</td></tr>
    </table>`;

  html += sec("一般注意事项") + ul(KB.generalBase);
  if (op.length) {
    html += `<h4>◆ 手术/操作相关注意事项</h4>` + ul(KB.generalSurgical);
  }

  if (dz.length) {
    html += sec("合并疾病注意事项");
    dz.forEach(k => { html += `<h4>◆ ${KB.diseases[k].label}</h4>` + ul(KB.diseases[k].items); });
  }

  if (op.length) {
    html += sec("术后专项要求");
    op.forEach(k => { html += `<h4>◆ ${KB.surgeries[k].label}</h4>` + ul(KB.surgeries[k].items); });
  }

  if (meds.length) {
    html += sec("出院带药及用药注意事项");
    html += `<table class="meds">
      <tr><th>药品名称</th><th>规格/剂量</th><th>用法</th><th>疗程</th></tr>
      ${meds.map(m => `<tr><td>${esc(m.name)}</td><td>${esc(m.dose)}</td><td>${esc(m.usage)}</td><td>${esc(m.course)}</td></tr>`).join("")}
    </table>`;
    const clsSet = [...new Set(meds.map(m => m.cls).filter(Boolean))];
    clsSet.forEach(k => { html += `<h4>◆ ${KB.drugClasses[k].label}</h4>` + ul(KB.drugClasses[k].items); });
  }

  html += `<div class="redflag-box">${sec("出现以下情况请立即就诊 / 拨打急救电话 120")}${ul(KB.redFlags)}</div>`;

  const fu = [];
  if ($("fuDate").value.trim()) fu.push(`首次复诊时间：${v("fuDate")}`);
  if ($("fuPlace").value.trim()) fu.push(`复诊地点：${v("fuPlace")}`);
  if ($("fuTel").value.trim()) fu.push(`随访咨询电话：${v("fuTel")}`);
  if (fu.length) html += sec("复诊与随访安排") + ul(fu);

  html += `
    <div class="sign-area">
      <span>主管医师（签名）：${v("fuDoc") ? "　" + v("fuDoc") : "＿＿＿＿＿＿＿＿"}</span>
      <span>患者/家属（签名）：＿＿＿＿＿＿＿＿</span>
      <span>日期：＿＿＿＿年＿＿月＿＿日</span>
    </div>
    <p class="disclaimer">说明：本告知书为出院健康指导的一般性建议，具体诊疗及用药请以主管医师医嘱为准；
    病情变化时请及时就诊。患者/家属签名表示已知晓上述内容。</p>`;

  $("sheet").innerHTML = html;
}

function doPrint() { render(); window.print(); }
function doPdf() {
  render();
  alert("即将打开打印对话框：\n在「目标打印机 / 打印机」中选择「另存为 PDF」即可生成 PDF 文件。");
  window.print();
}

/* ---------- 草稿保存 ---------- */
const DRAFT_KEY = "cardiacDischargeDraft";
const FIELD_IDS = ["ptName","ptSex","ptAge","ptId","ptDate","ptDx","ptOp","fuDate","fuPlace","fuTel","fuDoc"];

function saveDraft() {
  const d = { fields: {}, dz: checked("dz"), op: checked("op"), meds: getMeds() };
  FIELD_IDS.forEach(id => d.fields[id] = $(id).value);
  localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
}
function loadDraft() {
  try {
    const d = JSON.parse(localStorage.getItem(DRAFT_KEY));
    if (!d) return;
    FIELD_IDS.forEach(id => { if (d.fields[id]) $(id).value = d.fields[id]; });
    (d.dz || []).forEach(k => { const c = $("dz_" + k); if (c) c.checked = true; });
    (d.op || []).forEach(k => { const c = $("op_" + k); if (c) c.checked = true; });
    (d.meds || []).forEach(m => addMedRow(m));
  } catch (e) { /* 忽略损坏的草稿 */ }
}
function clearAll() {
  if (!confirm("确定清空所有已填写内容？")) return;
  localStorage.removeItem(DRAFT_KEY);
  location.reload();
}

document.getElementById("formPanel").addEventListener("change", saveDraft);
loadDraft();
if (!document.querySelector("#medRows .med-row")) addMedRow();
</script>
