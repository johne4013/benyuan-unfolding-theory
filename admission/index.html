<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心脏外科 · 主诉/现病史/查体快速生成</title>
<style>
  :root {
    --primary: #1e6fb8; --primary-dark: #15528a; --bg: #eef2f6;
    --border: #d4dce4; --danger: #c0392b; --on: #1e8f5a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    background: var(--bg); color: #2c3e50; font-size: 14px;
  }
  .toolbar {
    position: sticky; top: 0; z-index: 10; background: var(--primary); color: #fff;
    padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .toolbar h1 { font-size: 17px; margin: 0 auto 0 0; font-weight: 600; }
  .toolbar button {
    border: none; border-radius: 4px; padding: 8px 18px; font-size: 14px;
    cursor: pointer; background: #fff; color: var(--primary-dark); font-weight: 600;
  }
  .toolbar button:hover { background: #e8f1fa; }
  .toolbar button.danger { background: transparent; color: #ffd9d3; border: 1px solid #ffd9d3; }

  .wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
  fieldset {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    margin: 0 0 14px; padding: 12px 16px 16px;
  }
  legend { font-weight: 700; color: var(--primary-dark); padding: 0 8px; font-size: 15px; }

  /* 病种多选分组 */
  .dz-group { margin-bottom: 8px; }
  .dz-group > .g-name { font-size: 12.5px; color: #888; font-weight: 700; margin-bottom: 4px; }
  .dz-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .dz-items label {
    display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 14px; cursor: pointer; user-select: none; font-size: 13px;
  }
  .dz-items label:has(input:checked) { background: #e8f1fa; border-color: var(--primary); color: var(--primary-dark); font-weight: 600; }
  .dz-items input { display: none; }

  .group-label { font-size: 12.5px; color: #555; font-weight: 700; margin: 8px 0 3px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin: 3px 0 4px; }
  .chips button {
    border: 1px solid var(--primary); background: #f4f9fe; color: var(--primary-dark);
    border-radius: 12px; padding: 3px 11px; font-size: 12.5px; cursor: pointer;
  }
  .chips button:hover { background: #e0eefb; }
  .chips.multi button.on { border-color: var(--on); background: #e4f6ed; color: var(--on); font-weight: 600; }

  label.field { display: block; font-size: 13px; color: #555; }
  label.field input {
    width: 100%; margin-top: 3px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 4px; font-size: 14px; font-family: inherit;
  }
  .row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
  .vitals { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px 8px; margin-bottom: 8px; }
  .vitals input { width: 100%; margin-top: 3px; padding: 6px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }

  textarea {
    width: 100%; padding: 7px 9px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 13.5px; font-family: inherit; resize: vertical; line-height: 1.6; background: #fcfdfe;
  }
  .out-head { display: flex; align-items: center; gap: 8px; margin: 8px 0 3px; }
  .out-head .lbl { font-size: 13px; color: #555; font-weight: 700; }
  .copy-btn {
    border: 1px solid var(--primary); background: #fff; color: var(--primary-dark);
    border-radius: 4px; padding: 2px 12px; font-size: 12px; cursor: pointer;
  }
  .copy-btn:hover { background: #e8f1fa; }
  .copy-btn.done { border-color: var(--on); color: var(--on); }
  .gen-btn {
    margin: 2px 0 2px; padding: 6px 16px; border: 1px dashed var(--primary);
    background: #f4f9fe; color: var(--primary-dark); border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .cc-count { font-size: 12px; color: #888; margin-left: 8px; }
  .cc-count.warn { color: var(--danger); }
  .ex-label { font-size: 12.5px; color: #777; margin: 6px 0 2px; font-weight: 600; }
  .tip { font-size: 12px; color: #888; margin: 4px 0; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>心脏外科 · 主诉 / 现病史 / 查体 快速生成</h1>
  <button onclick="copyAll(this)">复制全部</button>
  <button class="danger" onclick="clearAll()">清空重填</button>
</div>

<div class="wrap">

  <fieldset>
    <legend>① 病种（可多选，细化到具体病变）</legend>
    <div id="diseaseGroups"></div>
    <p class="tip">勾选后，下方主诉症状、现病史伴随症状、查体杂音/体征均按所选病变联合生成。</p>
  </fieldset>

  <fieldset>
    <legend>② 主诉</legend>
    <div class="chips" id="ccChips"></div>
    <div class="row">
      <label class="field">主要症状 <input id="cc_symptom"></label>
      <label class="field">持续时间 <input id="cc_duration" placeholder="3年，加重1周"></label>
    </div>
    <div class="out-head">
      <span class="lbl">主诉</span>
      <button class="copy-btn" onclick="copyField('cc_text', this)">复制</button>
      <span class="cc-count" id="ccCount"></span>
    </div>
    <input id="cc_text" oninput="ccCount()" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:14px;">
  </fieldset>

  <fieldset>
    <legend>③ 现病史</legend>
    <div class="group-label">诱因（单选）</div>
    <div class="chips multi single" id="hpi_cause"></div>
    <div class="group-label">起病方式（单选）</div>
    <div class="chips multi single" id="hpi_onset"></div>
    <div class="group-label">伴随症状（多选）</div>
    <div class="chips multi" id="hpi_assoc"></div>
    <div class="group-label">阴性症状（多选，鉴别用）</div>
    <div class="chips multi" id="hpi_neg"></div>
    <div class="group-label">病情演变（多选，不选则按“加重时间”自动生成）</div>
    <div class="chips multi" id="hpi_evo"></div>
    <div class="group-label">院外诊治经过（多选）</div>
    <div class="chips multi" id="hpi_care"></div>
    <div class="group-label">一般情况（多选，不选用默认）</div>
    <div class="chips multi" id="hpi_status"></div>
    <button class="gen-btn" onclick="buildHPI()" style="margin-top:8px;">⟳ 组装现病史</button>
    <div class="out-head">
      <span class="lbl">现病史</span>
      <button class="copy-btn" onclick="copyField('hpi', this)">复制</button>
    </div>
    <textarea id="hpi" rows="6" placeholder="点选上方内容后点「组装现病史」；____ 处需手动补全"></textarea>
  </fieldset>

  <fieldset>
    <legend>④ 体格检查（心 / 肺 / 腹部 / 下肢）</legend>
    <button class="gen-btn" onclick="genExam()">⟳ 按所选病种联合生成查体</button>
    <p class="tip">默认正常，生成后按实际修改；多个瓣膜病变的杂音会自动合并到“心脏”一栏；主诉/现病史中选了水肿，下肢会自动带出。</p>
    <div class="ex-label">心脏</div>
    <textarea id="ex_heart" rows="2"></textarea>
    <div class="ex-label">肺部</div>
    <textarea id="ex_lung" rows="2"></textarea>
    <div class="ex-label"><label style="cursor:pointer;"><input type="checkbox" id="inc_abdomen" onchange="saveDraft()"> 腹部（勾选后纳入查体，默认不纳入）</label></div>
    <textarea id="ex_abdomen" rows="2"></textarea>
    <div class="ex-label">下肢</div>
    <textarea id="ex_limb" rows="2"></textarea>
    <div class="out-head">
      <span class="lbl">查体（整段）</span>
      <button class="copy-btn" onclick="copyExam(this)">复制查体</button>
    </div>
  </fieldset>

</div>

<script>
/* =====================================================================
   病种知识库：科室维护人员仅需修改本区
   每条病变可贡献：cc(主诉症状) / assoc(现病史伴随) / heart{border,rhythm,murmur}
   / lung / abdomen / limb（查体片段，多病变自动合并）
   dx 字段当前未使用，保留备用
===================================================================== */
const COMMON_SYMPTOMS = ["胸闷","胸痛","心悸","气促","活动后气促","夜间阵发性呼吸困难",
  "双下肢水肿","晕厥","发热","乏力","咳嗽、咳痰","咯血"];

const COMMON = {
  cause: ["无明显诱因","劳累后","受凉感冒后","情绪激动后","饱餐后"],
  onset: ["逐渐出现","突发","反复出现"],
  assoc: ["伴心悸","伴气促","伴胸痛","伴出汗"],
  neg: ["无发热","无胸痛","无心悸","无气促","无咯血","无晕厥及黑矇","无夜间阵发性呼吸困难",
    "无双下肢水肿","无恶心、呕吐","无腹痛、腹泻","无头晕、头痛","无意识障碍","无肢体活动障碍",
    "无大汗","无声音嘶哑","无咳嗽、咳痰","无盗汗、消瘦"],
  evo: ["上述症状反复发作","症状程度较前逐渐加重","发作较前频繁，持续时间延长",
    "活动耐量进行性下降","症状于活动后明显，休息后可缓解","出现夜间不能平卧",
    "症状持续不缓解","院外治疗效果欠佳","症状时轻时重"],
  care: ["未予正规诊治","曾就诊于当地医院","行心脏彩超提示“____”","行主动脉CTA提示“____”",
    "行冠状动脉造影提示“____”","经治疗后症状稍缓解","经治疗后症状无明显缓解",
    "本次为进一步诊治，门诊以“____”收入我科"],
  status: ["发病以来精神、饮食、睡眠可","精神欠佳","饮食差","睡眠差","大小便正常",
    "尿量减少","体重无明显变化","体重下降"]
};

const COND = {
  /* 瓣膜病 */
  ms: { label:"二尖瓣狭窄", dx:"心脏瓣膜病：二尖瓣狭窄",
    cc:["活动后心悸、气促","咯血"], assoc:["伴心悸","伴咳嗽、咯血","伴夜间阵发性呼吸困难"],
    heart:{ border:"心界向左扩大", murmur:"心尖区可触及舒张期震颤，闻及舒张期隆隆样杂音，第一心音亢进，肺动脉瓣区第二心音亢进" } },
  mr: { label:"二尖瓣关闭不全", dx:"心脏瓣膜病：二尖瓣关闭不全",
    cc:["活动后胸闷、气促"], assoc:["伴心悸","伴乏力"],
    heart:{ border:"心界向左下扩大", murmur:"心尖区可闻及__/6级全收缩期吹风样杂音，向左腋下传导" } },
  as: { label:"主动脉瓣狭窄", dx:"心脏瓣膜病：主动脉瓣狭窄",
    cc:["活动后胸闷、气促","心绞痛","晕厥"], assoc:["伴心绞痛","伴黑矇、晕厥"],
    heart:{ border:"心界向左下扩大", murmur:"主动脉瓣区可触及收缩期震颤，闻及__/6级粗糙喷射样收缩期杂音，向颈部传导，主动脉瓣区第二心音减弱" } },
  ar: { label:"主动脉瓣关闭不全", dx:"心脏瓣膜病：主动脉瓣关闭不全",
    cc:["活动后心悸、气促"], assoc:["伴心悸，自觉心搏增强","伴头颈部搏动感"],
    heart:{ border:"心界向左下扩大呈靴形", murmur:"主动脉瓣第二听诊区可闻及叹气样舒张期杂音，向心尖传导" },
    limb:"可见周围血管征（水冲脉、毛细血管搏动征及股动脉枪击音）" },
  tr: { label:"三尖瓣关闭不全", dx:"心脏瓣膜病：三尖瓣关闭不全",
    cc:["腹胀","双下肢水肿"], assoc:["伴腹胀、纳差","伴双下肢水肿"],
    heart:{ murmur:"胸骨左缘第4~5肋间可闻及全收缩期吹风样杂音，吸气时增强" },
    abdomen:"肝肿大，肝肋下__cm可触及，可有搏动感", limb:"双下肢凹陷性水肿" },

  /* 冠心病 */
  cad: { label:"冠心病/心绞痛", dx:"冠状动脉粥样硬化性心脏病  不稳定型心绞痛",
    cc:["心前区疼痛","活动后胸闷、胸痛"],
    assoc:["心前区压榨性疼痛，向左肩及左上臂放射","活动后加重，休息或含服硝酸甘油后可缓解","伴出汗","伴心悸"] },
  omi: { label:"陈旧性心梗", dx:"陈旧性心肌梗死",
    cc:["活动后胸闷、气促"], assoc:["既往有心肌梗死病史","活动耐量下降"] },

  /* 先天性心脏病 */
  asd: { label:"房间隔缺损", dx:"先天性心脏病：房间隔缺损",
    cc:["反复呼吸道感染","活动后气促","发现心脏杂音"], assoc:["自幼易患感冒及呼吸道感染","活动耐量较同龄人差"],
    heart:{ murmur:"胸骨左缘第2~3肋间可闻及__/6级收缩期杂音，肺动脉瓣区第二心音亢进、固定分裂" } },
  vsd: { label:"室间隔缺损", dx:"先天性心脏病：室间隔缺损",
    cc:["反复呼吸道感染","发现心脏杂音"], assoc:["自幼发现心脏杂音","自幼易患呼吸道感染"],
    heart:{ murmur:"胸骨左缘第3~4肋间可触及收缩期震颤，闻及__/6级粗糙全收缩期杂音" } },
  pda: { label:"动脉导管未闭", dx:"先天性心脏病：动脉导管未闭",
    cc:["发现心脏杂音","反复呼吸道感染"], assoc:["自幼发现心脏杂音"],
    heart:{ murmur:"胸骨左缘第2肋间可闻及连续性机器样杂音" },
    limb:"可见周围血管征（水冲脉、股动脉枪击音）" },
  tof: { label:"法洛四联症", dx:"先天性心脏病：法洛四联症",
    cc:["发绀","活动后气促、蹲踞"], assoc:["自幼口唇发绀","活动后喜蹲踞"],
    heart:{ murmur:"胸骨左缘第2~4肋间可闻及收缩期杂音，肺动脉瓣区第二心音减弱" },
    limb:"可见杵状指（趾）" },

  /* 心衰 / 心律失常 */
  hf: { label:"心力衰竭", dx:"心功能不全（心功能__级 NYHA分级）",
    cc:["活动后胸闷、气促","夜间阵发性呼吸困难","不能平卧","双下肢水肿"],
    assoc:["伴夜间阵发性呼吸困难","伴端坐呼吸","伴双下肢水肿","伴腹胀、纳差","伴尿量减少"],
    heart:{ border:"心界向左下扩大" },
    lung:"双肺呼吸音粗，双肺底可闻及细湿性啰音",
    abdomen:"肝肋下__cm可触及，质软伴轻压痛，肝颈静脉回流征阳性",
    limb:"双下肢对称性凹陷性水肿" },
  af: { label:"心房颤动", dx:"心律失常：心房颤动",
    cc:["心悸"], assoc:["伴阵发性心悸","自觉心跳不规则"],
    heart:{ rhythm:"心律绝对不齐，第一心音强弱不等，脉搏短绌" } },

  /* 心包积液 */
  pe: { label:"心包积液", dx:"心包积液（____）",
    cc:["胸闷","气促","不能平卧","发热"], assoc:["伴发热","伴乏力、消瘦","伴不能平卧"],
    heart:{ border:"心界向两侧扩大", murmur:"心尖搏动减弱，心音遥远，可闻及心包摩擦音" } },

  /* 主动脉 / 血管 */
  aadA: { label:"主动脉夹层A型", dx:"主动脉夹层（Stanford A型）",
    cc:["突发胸背部撕裂样疼痛"], assoc:["呈撕裂样疼痛，向腰背部放射","伴大汗淋漓","伴恶心、呕吐"],
    heart:{ murmur:"主动脉瓣区可闻及舒张期杂音" }, limb:"双侧肢体血压、脉搏不对称" },
  aadB: { label:"主动脉夹层B型", dx:"主动脉夹层（Stanford B型）",
    cc:["突发胸背部撕裂样疼痛","腹痛"], assoc:["呈撕裂样疼痛，向腰背部及腹部放射","伴大汗"],
    limb:"双下肢血压、脉搏不对称，左下肢皮温减低" },
  taa: { label:"胸主动脉瘤", dx:"胸主动脉瘤",
    cc:["胸背部疼痛","声音嘶哑","发现纵隔增宽"], assoc:["伴声音嘶哑","伴吞咽不适"] },
  aaa: { label:"腹主动脉瘤", dx:"腹主动脉瘤",
    cc:["腹部搏动性包块","腹痛、腰背痛"], assoc:["伴腰背部疼痛"],
    abdomen:"脐周可触及搏动性包块，约__cm×__cm，可闻及收缩期血管杂音" },

  /* 其他 */
  ie: { label:"感染性心内膜炎", dx:"感染性心内膜炎",
    cc:["发热","乏力"], assoc:["伴反复发热","伴畏寒、盗汗","伴乏力、消瘦"],
    heart:{ murmur:"心脏听诊可闻及病理性杂音（性质可变）" },
    limb:"皮肤可见瘀点，可见Osler结节及Janeway损害" },
  myxoma: { label:"心脏黏液瘤", dx:"心脏黏液瘤",
    cc:["活动后气促","晕厥","发热"], assoc:["体位改变时症状明显","伴一过性晕厥"],
    heart:{ murmur:"心尖区可闻及随体位改变的舒张期杂音（可闻及肿瘤扑落音）" } }
};

const GROUPS = [
  { name:"瓣膜病", items:["ms","mr","as","ar","tr"] },
  { name:"冠心病", items:["cad","omi"] },
  { name:"先天性心脏病", items:["asd","vsd","pda","tof"] },
  { name:"心力衰竭 / 心律失常", items:["hf","af"] },
  { name:"心包积液", items:["pe"] },
  { name:"主动脉 / 血管", items:["aadA","aadB","taa","aaa"] },
  { name:"其他", items:["ie","myxoma"] }
];

/* 查体正常默认值 */
const NORMAL = {
  lung: "双肺呼吸音清，未闻及干湿性啰音及胸膜摩擦音。",
  abdomen: "腹平软，全腹无压痛及反跳痛，肝脾肋下未触及，移动性浊音阴性。",
  limb: "双下肢无水肿，足背动脉搏动正常对称。"
};

/* =====================================================================
   逻辑
===================================================================== */
const $ = id => document.getElementById(id);
const uniq = a => [...new Set(a)];

/* 病种多选渲染 */
$("diseaseGroups").innerHTML = GROUPS.map(g =>
  `<div class="dz-group"><div class="g-name">${g.name}</div><div class="dz-items">` +
  g.items.map(k => `<label><input type="checkbox" id="cd_${k}" onchange="onCondChange()">${COND[k].label}</label>`).join("") +
  `</div></div>`).join("");

const selectedKeys = () => Object.keys(COND).filter(k => $("cd_" + k)?.checked);

function onCondChange() {
  rebuildCcChips();
  rebuildMulti("hpi_assoc", uniq(selectedKeys().flatMap(k => COND[k].assoc || [])).concat(COMMON.assoc));
  saveDraft();
}

/* —— 主诉 —— */
function rebuildCcChips() {
  const fromCond = uniq(selectedKeys().flatMap(k => COND[k].cc || []));
  const list = uniq(fromCond.concat(COMMON_SYMPTOMS));
  $("ccChips").innerHTML = list.map(s =>
    `<button type="button" onclick="addSymptom(this.textContent)">${s}</button>`).join("");
}
function addSymptom(s) {
  const f = $("cc_symptom");
  const cur = f.value.split("、").map(x => x.trim()).filter(Boolean);
  if (!cur.includes(s)) cur.push(s);
  f.value = cur.join("、");
  composeCC();
}
function composeCC() {
  $("cc_text").value = $("cc_symptom").value.trim() + $("cc_duration").value.trim();
  ccCount(); saveDraft();
}
$("cc_symptom").addEventListener("input", composeCC);
$("cc_duration").addEventListener("input", composeCC);
function ccCount() {
  const n = $("cc_text").value.length, el = $("ccCount");
  el.textContent = n ? n + " 字" + (n > 20 ? "（建议≤20字）" : "") : "";
  el.className = "cc-count" + (n > 20 ? " warn" : "");
}

/* —— 现病史 multi-chips —— */
function rebuildMulti(id, arr) {
  const on = new Set([...document.querySelectorAll(`#${id} button.on`)].map(b => b.textContent));
  const single = $(id).classList.contains("single");
  $(id).innerHTML = uniq(arr).map(s =>
    `<button type="button" class="${on.has(s) ? "on" : ""}" onclick="pickChip(this,${single})">${s}</button>`).join("");
}
function pickChip(btn, single) {
  if (single) btn.parentNode.querySelectorAll("button").forEach(b => { if (b !== btn) b.classList.remove("on"); });
  btn.classList.toggle("on");
  saveDraft();
}
const picked = id => [...document.querySelectorAll(`#${id} button.on`)].map(b => b.textContent);

function initStaticChips() {
  rebuildMulti("hpi_cause", COMMON.cause);
  rebuildMulti("hpi_onset", COMMON.onset);
  rebuildMulti("hpi_neg", COMMON.neg);
  rebuildMulti("hpi_evo", COMMON.evo);
  rebuildMulti("hpi_care", COMMON.care);
  rebuildMulti("hpi_status", COMMON.status);
}

function buildHPI() {
  if ($("hpi").value.trim() && !confirm("现病史已有内容，重新组装将覆盖，是否继续？")) return;
  const durRaw = $("cc_duration").value.trim();
  const dur = (durRaw || "____").replace(/[，,].*$/, "");
  const sym = $("cc_symptom").value.trim() || "____";
  const cause = picked("hpi_cause")[0] || "无明显诱因";
  const onset = picked("hpi_onset")[0] || "出现";
  const assoc = picked("hpi_assoc"), neg = picked("hpi_neg"),
        care = picked("hpi_care"), status = picked("hpi_status");
  /* 起病 + 伴随 */
  let s = `患者于${dur}前${cause}${onset}${sym}`;
  if (assoc.length) s += "，" + assoc.join("，");
  s += "。";
  /* 阴性症状 */
  if (neg.length) s += "病程中" + neg.join("、") + "。";
  /* 病情演变：未点选时按“加重时间”自动生成 */
  let evo = picked("hpi_evo").join("，");
  if (!evo) {
    const tail = (durRaw.split(/[，,]/)[1] || "").trim();
    const m = tail.match(/加重(.+)/);
    if (m) evo = `${m[1]}前上述症状明显加重`;
  }
  if (evo) s += evo + "。";
  /* 院外诊治 + 一般情况 */
  if (care.length) s += care.join("，") + "。";
  s += (status.length ? status.join("，") : "发病以来精神、饮食、睡眠可，大小便正常，体重无明显变化") + "。";
  $("hpi").value = s;
  saveDraft();
}

/* —— 查体联合生成 —— */
let examDirty = false;
["ex_heart","ex_lung","ex_abdomen","ex_limb"].forEach(id =>
  $(id).addEventListener("input", () => { examDirty = true; saveDraft(); }));

function genExam() {
  if (examDirty && (val("ex_heart") || val("ex_lung") || val("ex_abdomen") || val("ex_limb"))
      && !confirm("查体已手动修改，重新生成将覆盖，是否继续？")) return;
  const sel = selectedKeys().map(k => COND[k]);
  const borders = [], murmurs = [], lung = [], abdomen = [], limb = [];
  let rhythm = null;
  sel.forEach(c => {
    const h = c.heart || {};
    if (h.border) borders.push(h.border);
    if (h.rhythm) rhythm = h.rhythm;
    if (h.murmur) murmurs.push(h.murmur);
    if (c.lung) lung.push(c.lung);
    if (c.abdomen) abdomen.push(c.abdomen);
    if (c.limb) limb.push(c.limb);
  });
  /* 主诉/现病史里选了水肿 → 下肢自动带出 */
  const symText = $("cc_symptom").value + " " + picked("hpi_assoc").join(" ");
  if (/水肿/.test(symText) && !limb.some(x => x.includes("水肿"))) limb.push("双下肢凹陷性水肿");
  /* 腹部有阳性发现时自动勾选纳入 */
  if (abdomen.length) $("inc_abdomen").checked = true;
  const hp = ["心前区无异常隆起"];
  hp.push(borders.length ? uniq(borders).join("、") : "心界不大");
  hp.push("心率__次/分");
  hp.push(rhythm || "律齐");
  hp.push(murmurs.length ? uniq(murmurs).join("；") : "各瓣膜听诊区未闻及病理性杂音");
  $("ex_heart").value = hp.join("，") + "。";
  $("ex_lung").value = lung.length ? uniq(lung).join("；") + "。" : NORMAL.lung;
  $("ex_abdomen").value = abdomen.length ? uniq(abdomen).join("；") + "。" : NORMAL.abdomen;
  $("ex_limb").value = limb.length ? uniq(limb).join("；") + "。" : NORMAL.limb;
  examDirty = false;
  saveDraft();
}

/* —— 查体整段文本 —— */
const val = id => $(id).value.trim();
function examFull() {
  const parts = [val("ex_heart"), val("ex_lung")];
  if ($("inc_abdomen").checked) parts.push(val("ex_abdomen"));
  parts.push(val("ex_limb"));
  return parts.filter(Boolean).join("");
}

/* —— 复制 —— */
async function copyText(t) {
  try { await navigator.clipboard.writeText(t); }
  catch (e) {
    const ta = document.createElement("textarea");
    ta.value = t; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); ta.remove();
  }
}
function flash(btn) {
  const old = btn.textContent;
  btn.textContent = "已复制✓"; btn.classList.add("done");
  setTimeout(() => { btn.textContent = old; btn.classList.remove("done"); }, 1200);
}
function copyField(id, btn) { copyText($(id).value.trim()); flash(btn); }
function copyExam(btn) { copyText(examFull()); flash(btn); }
function copyAll(btn) {
  const parts = [];
  if (val("cc_text")) parts.push("主诉：" + val("cc_text"));
  if (val("hpi")) parts.push("现病史：" + val("hpi"));
  parts.push("查体：" + examFull());
  copyText(parts.join("\n\n")); flash(btn);
}

/* —— 草稿 —— */
const DRAFT_KEY = "cardiacIntakeV3";
const TEXT_IDS = ["cc_symptom","cc_duration","cc_text","hpi",
  "ex_heart","ex_lung","ex_abdomen","ex_limb"];
const CHIP_GROUPS = ["hpi_cause","hpi_onset","hpi_assoc","hpi_neg","hpi_evo","hpi_care","hpi_status"];

function saveDraft() {
  const d = { conds: selectedKeys(), fields: {}, chips: {}, incAbdomen: $("inc_abdomen").checked };
  TEXT_IDS.forEach(id => d.fields[id] = $(id).value);
  CHIP_GROUPS.forEach(g => d.chips[g] = picked(g));
  localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
}
function loadDraft() {
  initStaticChips();
  let d; try { d = JSON.parse(localStorage.getItem(DRAFT_KEY)); } catch (e) {}
  if (d) {
    (d.conds || []).forEach(k => { const c = $("cd_" + k); if (c) c.checked = true; });
  }
  rebuildCcChips();
  rebuildMulti("hpi_assoc", uniq(selectedKeys().flatMap(k => COND[k].assoc || [])).concat(COMMON.assoc));
  if (d) {
    TEXT_IDS.forEach(id => { if (d.fields?.[id] != null) $(id).value = d.fields[id]; });
    $("inc_abdomen").checked = !!d.incAbdomen;
    Object.entries(d.chips || {}).forEach(([g, arr]) =>
      [...document.querySelectorAll(`#${g} button`)].forEach(b => {
        if (arr.includes(b.textContent)) b.classList.add("on"); }));
  }
  ccCount();
}
function clearAll() {
  if (!confirm("确定清空所有已填写内容？")) return;
  localStorage.removeItem(DRAFT_KEY); location.reload();
}

loadDraft();
</script>
